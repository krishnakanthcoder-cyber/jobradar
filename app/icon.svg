<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="url(#g)"/>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c95b26"/>
      <stop offset="100%" stop-color="#d97c4d"/>
    </linearGradient>
  </defs>
  <!-- Concentric arcs from bottom-left -->
  <path d="M 4,23 A 7,7 0 0,1 11,30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 4,15 A 15,15 0 0,1 19,30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Sweep line -->
  <line x1="4" y1="30" x2="22" y2="9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4"/>
  <!-- Origin dot -->
  <circle cx="4" cy="30" r="2.5" fill="white"/>
  <!-- Detection blip with pulse ring -->
  <circle cx="18" cy="12" r="5" stroke="white" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="18" cy="12" r="2.5" fill="white"/>
</svg>
